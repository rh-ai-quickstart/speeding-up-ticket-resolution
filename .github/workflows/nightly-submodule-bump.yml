name: Nightly Submodule Bump

on:
  schedule:
    - cron: '0 0 * * *'  # 19:00 EST (UTC-5); drifts to 20:00 during EDT — GitHub Actions cron has no timezone support
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-submodule:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PR_CREATION_APP_IT_SELF_SERVICE_ID }}
          private-key: ${{ secrets.PR_CREATION_APP_IT_SELF_SERVICE_PRIVATE_KEY }}

      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ steps.generate_token.outputs.token }}

      - name: Update submodule to latest on tracked branch
        id: update
        run: |
          OLD_SHA=$(git rev-parse HEAD:it-self-service-agent)
          git submodule init it-self-service-agent
          git submodule update --remote it-self-service-agent
          NEW_SHA=$(git -C it-self-service-agent rev-parse HEAD)

          if [ "$OLD_SHA" = "$NEW_SHA" ]; then
            echo "Submodule already up to date at ${OLD_SHA:0:7}"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Submodule updated from ${OLD_SHA:0:7} to ${NEW_SHA:0:7}"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "old_sha_short=${OLD_SHA:0:7}" >> $GITHUB_OUTPUT
            echo "new_sha_short=${NEW_SHA:0:7}" >> $GITHUB_OUTPUT
          fi

      - name: Check if PR already exists
        if: steps.update.outputs.has_changes == 'true'
        id: check_pr
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          BRANCH_NAME="chore/nightly-submodule-bump-${{ steps.update.outputs.new_sha_short }}"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

          PR_NUMBER=$(gh pr list --base dev --head "$BRANCH_NAME" --state open --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            echo "PR already exists: #$PR_NUMBER"
            echo "pr_exists=true" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          else
            echo "pr_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create branch and commit
        if: steps.update.outputs.has_changes == 'true' && steps.check_pr.outputs.pr_exists == 'false'
        run: |
          OLD_SHA="${{ steps.update.outputs.old_sha_short }}"
          NEW_SHA="${{ steps.update.outputs.new_sha_short }}"
          BRANCH_NAME="${{ steps.check_pr.outputs.branch_name }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git add it-self-service-agent
          git commit -m "chore: update submodule: bump it-self-service-agent from \`${OLD_SHA}\` to \`${NEW_SHA}\`"
          git push origin "$BRANCH_NAME"

      - name: Create Pull Request
        if: steps.update.outputs.has_changes == 'true' && steps.check_pr.outputs.pr_exists == 'false'
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          OLD_SHA="${{ steps.update.outputs.old_sha_short }}"
          NEW_SHA="${{ steps.update.outputs.new_sha_short }}"
          BRANCH_NAME="${{ steps.check_pr.outputs.branch_name }}"

          cat > pr_body.txt <<EOF
          ## Summary

          Automated nightly submodule bump for \`it-self-service-agent\`.

          - **From:** \`${OLD_SHA}\`
          - **To:** \`${NEW_SHA}\`

          ---

          **Workflow:** [${{ github.workflow }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF

          gh pr create \
            --base dev \
            --head "$BRANCH_NAME" \
            --title "chore: update submodule: bump it-self-service-agent from \`${OLD_SHA}\` to \`${NEW_SHA}\`" \
            --body-file pr_body.txt

          echo "Pull Request created successfully"

      - name: PR already exists
        if: steps.update.outputs.has_changes == 'true' && steps.check_pr.outputs.pr_exists == 'true'
        run: echo "PR #${{ steps.check_pr.outputs.pr_number }} already exists for this bump."

      - name: No changes needed
        if: steps.update.outputs.has_changes == 'false'
        run: echo "Submodule it-self-service-agent is already up to date."
