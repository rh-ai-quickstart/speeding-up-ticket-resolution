name: CI

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-submodule:
    name: Verify submodule
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Assert it-self-service-agent is present and valid
        run: |
          set -euo pipefail
          test -f it-self-service-agent/Makefile
          test -e it-self-service-agent/.git
          git submodule status --recursive
          (cd it-self-service-agent && git rev-parse HEAD && git cat-file -t "$(git rev-parse HEAD)" | grep -q '^commit$')

      - name: Verify root Makefile (glue)
        run: make help
        
      - name: Verify upstream pin consistency
        run: |
          set -euo pipefail
          echo "🔍 Checking upstream GitHub URLs match submodule pin..."
          . ./scripts/upstream-doc-urls.lib.sh
          upstream_doc_validate_sha_lengths
          PIN="$(git -C it-self-service-agent rev-parse HEAD)"
          upstream_doc_assert_urls_match_pin "$PIN"
          echo "✅ All upstream URLs reference pinned commit ${PIN}"

  shell-lint:
    name: Shell Script Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run ShellCheck
        run: |
          echo "🔍 Running ShellCheck on scripts/..."
          shellcheck --severity=warning scripts/*.sh || {
            echo "::error::ShellCheck found issues in shell scripts"
            echo "Install shellcheck locally: brew install shellcheck (macOS) or apt install shellcheck (Linux)"
            exit 1
          }
          echo "✅ Shell scripts pass lint"

  markdown-links:
    name: Markdown links
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      # Pin CLI; avoids transitive-dep drift when the global install target floats with Node/npm (Docker lts images have broken markdown-link-check in CI).
      MARKDOWN_LINK_CHECK_VERSION: "3.10.3"
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check Markdown links
        run: make check-links
